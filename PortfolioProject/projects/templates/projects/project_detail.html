{% extends "core/base.html" %}
{% block content %}

<div class="bg-white text-gray-900 rounded-2xl p-8 shadow">

<h1 class="text-4xl font-bold mb-3">{{ project.title }}</h1>

<p class="text-gray-500 mb-4">
Created: {{ project.created_date }}
</p>

<p class="mb-6">{{ project.description }}</p>

<h3 class="font-bold mb-2">Tech Stack</h3>
<p class="mb-6">{{ project.tech_stack }}</p>

<a href="{{ project.github_link }}"
   class="bg-black text-white px-4 py-2 rounded">
   View GitHub
</a>

<a href="/projects/"
   class="ml-3 bg-gray-300 px-4 py-2 rounded">
   Back
</a>

</div>

{% endblock %}

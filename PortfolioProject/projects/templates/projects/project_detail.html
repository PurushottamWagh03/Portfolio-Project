{% extends "core/base.html" %}
{% block content %}

<div class="max-w-6xl mx-auto mt-10 bg-white rounded-2xl shadow-lg p-10">

    <!-- TITLE -->
    <h1 class="text-4xl font-bold text-black mb-4">
        {{ project.title }}
    </h1>

    <!-- DATE -->
    <p class="text-gray-600 mb-6">
        Created: {{ project.created_date }}
    </p>

    <!-- DESCRIPTION -->
    <p class="text-lg text-gray-800 leading-relaxed mb-8">
        {{ project.description }}
    </p>

    <!-- TECH STACK -->
    <div class="flex flex-wrap gap-3 mb-8">
        {% for tech in project.tech_stack.split %}
        <span class="bg-blue-100 text-blue-900 px-4 py-2 rounded-full">
            {{ tech }}
        </span>
        {% endfor %}
    </div>

    <!-- BUTTONS -->
    <div class="flex gap-4">

        <a href="{{ project.github_link }}"
           target="_blank"
           class="bg-black text-white px-6 py-2 rounded-lg hover:bg-gray-800">
           View GitHub
        </a>

        <a href="{% url 'projects' %}"
           class="bg-gray-300 text-black px-6 py-2 rounded-lg hover:bg-gray-400">
           Back
        </a>

    </div>

</div>

{% endblock %}

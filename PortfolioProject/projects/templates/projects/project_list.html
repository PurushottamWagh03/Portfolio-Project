{% extends "core/base.html" %}

{% block content %}

<section class="max-w-7xl mx-auto py-12 px-4 relative z-10">
    
    <!-- Decorative Blurs -->
    <div class="absolute top-0 right-10 w-96 h-96 bg-brand-indigo/10 blur-[100px] rounded-full z-[-1]"></div>
    <div class="absolute bottom-20 left-10 w-96 h-96 bg-brand-cyan/10 blur-[100px] rounded-full z-[-1]"></div>

    <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
        <div>
            <h1 class="text-5xl md:text-6xl font-black font-heading text-transparent bg-clip-text bg-gradient-to-r from-brand-indigo to-brand-cyan inline-block pb-2 drop-shadow-sm">
                Projects Showcase
            </h1>
            <p class="text-gray-400 mt-2 text-lg font-light">Explore some of my recent work</p>
        </div>
        
        <!-- ADD PROJECT BUTTON -->
        <a href="{% url 'add_project' %}"
           class="group flex items-center justify-center gap-2 bg-white/10 border border-white/20 hover:border-brand-cyan hover:bg-brand-cyan/10 text-white px-6 py-3 rounded-full font-bold transition-all duration-300 shadow-[0_0_15px_rgba(0,0,0,0.2)] hover:shadow-[0_0_20px_rgba(6,182,212,0.3)] min-w-max">
           <svg class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
           Add Project
        </a>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">

        {% for project in projects %}
        <div class="glass-card rounded-[2rem] p-8 flex flex-col h-full group relative overflow-hidden transition-all duration-500 hover:-translate-y-2">
            
            <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-0"></div>

            <div class="relative z-10 flex-grow">
                <div class="w-12 h-12 rounded-xl bg-brand-indigo/20 text-brand-indigo flex items-center justify-center mb-6">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                </div>

                <h3 class="text-2xl font-bold font-heading text-white mb-3 group-hover:text-brand-cyan transition-colors">
                    {{ project.title }}
                </h3>
                
                <p class="text-gray-400 text-sm leading-relaxed mb-8">
                    {{ project.description|truncatechars:180 }}
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="relative z-10 pt-6 border-t border-white/10 flex items-center justify-between gap-2 mt-auto">
                <!-- VIEW DETAILS BUTTON -->
                <a href="{% url 'project_detail' project.slug %}"
                   class="peer bg-brand-indigo/20 text-brand-indigo border border-brand-indigo/30 hover:bg-brand-indigo hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all shadow-[0_0_10px_rgba(99,102,241,0.1)] flex-grow text-center">
                    View
                </a>
                
                <!-- EDIT BUTTON -->
                <a href="/admin/projects/project/{{ project.id }}/change/"
                   class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/30 hover:bg-yellow-500 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all px-3">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </a>
                
                <!-- DELETE BUTTON -->
                <a href="/admin/projects/project/{{ project.id }}/delete/"
                   class="bg-red-500/10 text-red-500 border border-red-500/30 hover:bg-red-500 hover:text-white px-4 py-2 rounded-lg text-sm font-semibold transition-all px-3">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </a>
            </div>
        </div>
        {% endfor %}

    </div>

</section>

{% endblock %}

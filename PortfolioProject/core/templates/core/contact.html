{% extends "core/base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto mt-12 mb-20 px-4 relative z-10">
    
    <!-- Header -->
    <div class="text-center mb-12">
        <h1 class="text-5xl md:text-6xl font-black font-heading text-transparent bg-clip-text bg-gradient-to-r from-brand-indigo to-pink-500 inline-block pb-2 drop-shadow-sm">
            Let's Talk
        </h1>
        <p class="text-gray-400 mt-4 text-lg">Have a project in mind? Looking to hire? Get in touch.</p>
    </div>

    <!-- Success Message -->
    {% if success %}
    <div class="glass-card mb-8 p-4 rounded-xl border border-emerald-500/30 bg-emerald-500/10 flex items-center gap-4 text-emerald-400 shadow-[0_0_20px_rgba(52,211,153,0.15)] animate-[float_3s_ease-in-out_infinite]">
        <div class="p-2 bg-emerald-500/20 rounded-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <div>
            <h4 class="font-bold text-white">Message Sent Successfully!</h4>
            <p class="text-sm opacity-90">I will get back to you as soon as possible.</p>
        </div>
    </div>
    {% endif %}

    <!-- Form Container -->
    <div class="glass-card rounded-[2rem] p-8 md:p-12 relative overflow-hidden backdrop-blur-2xl">
        
        <!-- Decorative subtle element -->
        <div class="absolute -top-32 -left-32 w-80 h-80 bg-brand-indigo/20 blur-[100px] rounded-full z-0"></div>

        <form method="POST" class="space-y-8 relative z-10">
            {% csrf_token %}

            <div class="grid md:grid-cols-2 gap-8">
                <!-- Name -->
                <div class="space-y-2">
                    <label class="block text-gray-300 font-medium tracking-wide text-sm ml-1">Your Name</label>
                    <input type="text" name="{{ form.name.html_name }}" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-indigo focus:ring-1 focus:ring-brand-indigo transition-all duration-300 shadow-inner"
                        placeholder="John Doe">
                </div>

                <!-- Email -->
                <div class="space-y-2">
                    <label class="block text-gray-300 font-medium tracking-wide text-sm ml-1">Email Address</label>
                    <input type="email" name="{{ form.email.html_name }}" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-brand-cyan focus:ring-1 focus:ring-brand-cyan transition-all duration-300 shadow-inner"
                        placeholder="john@example.com">
                </div>
            </div>

            <!-- Message -->
            <div class="space-y-2">
                <label class="block text-gray-300 font-medium tracking-wide text-sm ml-1">Your Message</label>
                <textarea name="message" required
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white placeholder-gray-500 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition-all duration-300 shadow-inner resize-y min-h-[160px]"
                    placeholder="Tell me about your project..."></textarea>
            </div>

            <!-- Submit Button -->
            <div class="text-center md:text-left pt-2">
                <button type="submit"
                    class="w-full md:w-auto group relative inline-flex items-center justify-center gap-3 px-10 py-4 font-bold text-white transition-all duration-300 bg-gradient-to-r from-brand-indigo to-pink-500 rounded-xl hover:shadow-[0_0_25px_rgba(168,85,247,0.4)] overflow-hidden">
                    <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-0 group-hover:opacity-20 bg-white transition-opacity"></span>
                    <span class="relative flex items-center gap-2">
                        Send Message
                        <svg class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </span>
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}

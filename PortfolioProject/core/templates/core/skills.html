{% extends 'core/base.html' %}

{% block content %}

<div class="max-w-6xl mx-auto mt-10">

    <div class="text-center mb-16 relative">
        <h1 class="text-5xl md:text-6xl font-black font-heading text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-brand-cyan inline-block pb-2">
            My Skills
        </h1>
        <div class="w-32 h-1.5 bg-gradient-to-r from-emerald-400 to-brand-cyan mx-auto rounded-full mt-4 opacity-80"></div>
    </div>

    <!-- Bento Grid for Skills -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 relative z-10">

        <!-- Languages -->
        <div class="glass-card p-8 rounded-3xl relative overflow-hidden group col-span-1 md:col-span-2 lg:col-span-1">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-yellow-500/10 blur-[40px] rounded-full group-hover:bg-yellow-500/20 transition-colors"></div>
            <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mb-6 text-yellow-400">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
            </div>
            <h2 class="text-2xl font-bold font-heading text-white mb-4">Languages</h2>
            <div class="flex gap-3 flex-wrap">
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">Python</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">Java</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">Kotlin</span>
            </div>
        </div>

        <!-- Frameworks -->
        <div class="glass-card p-8 rounded-3xl relative overflow-hidden group">
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-brand-cyan/10 blur-[40px] rounded-full group-hover:bg-brand-cyan/20 transition-colors"></div>
            <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mb-6 text-brand-cyan">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold font-heading text-white mb-4">Frameworks</h2>
            <div class="flex gap-3 flex-wrap">
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300 shadow-[0_0_10px_rgba(6,182,212,0.1)]">Django</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">DRF</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">HTML/CSS</span>
            </div>
        </div>

        <!-- Tools / ML -->
        <div class="glass-card p-8 rounded-3xl relative overflow-hidden group lg:col-span-1">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-brand-purple/10 blur-[40px] rounded-full group-hover:bg-brand-purple/20 transition-colors"></div>
            <div class="w-14 h-14 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center mb-6 text-brand-purple">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold font-heading text-white mb-4">ML & Data</h2>
            <div class="flex gap-3 flex-wrap">
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">Machine Learning</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300 shadow-[0_0_10px_rgba(168,85,247,0.1)]">NLP</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">Pandas</span>
                <span class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300">scikit-learn</span>
            </div>
        </div>

        <!-- Soft Skills -->
        <div class="glass-card p-8 rounded-3xl relative overflow-hidden group md:col-span-2 lg:col-span-3">
            <div class="absolute inset-0 bg-gradient-to-r from-brand-indigo/5 to-transparent z-0"></div>
            <div class="relative z-10 flex flex-col md:flex-row items-center gap-8">
                <div class="w-16 h-16 bg-white/5 border border-white/10 rounded-2xl flex items-center justify-center text-brand-indigo flex-shrink-0">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <div>
                    <h2 class="text-2xl font-bold font-heading text-white mb-4">Soft Skills & Leadership</h2>
                    <div class="flex gap-3 flex-wrap">
                        <span class="px-6 py-3 bg-brand-indigo/20 border border-brand-indigo/30 rounded-xl text-brand-indigo font-medium shadow-lg">Leadership</span>
                        <span class="px-6 py-3 bg-brand-cyan/20 border border-brand-cyan/30 rounded-xl text-brand-cyan font-medium shadow-lg">Communication</span>
                        <span class="px-6 py-3 bg-brand-purple/20 border border-brand-purple/30 rounded-xl text-brand-purple font-medium shadow-lg">Problem Solving</span>
                        <span class="px-6 py-3 bg-pink-500/20 border border-pink-500/30 rounded-xl text-pink-400 font-medium shadow-lg">Team Collaboration</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
